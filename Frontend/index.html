<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Urbalert · Reclamos ciudadanos de Santa Cruz</title>
    <script>
      // Aplica el tema guardado antes de pintar (evita parpadeo)
      (function () {
        try {
          var t = localStorage.getItem('urbalert_tema')
          var oscuro = t === 'oscuro' ||
            (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (oscuro) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
